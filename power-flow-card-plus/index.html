<!--
  power-flow-card-plus — real-time power flow card

  Served at: /local/views/power-flow-card-plus/index.html
  Data from: /local/views/power-flow-card-plus/data.json  (refreshed every 15 s by update.py)

  URL parameters (all optional):
    name=Page+Title                     — page/tab title

    Top-level overrides (<<key>>=<<value>>):
      w_decimals=0        kw_decimals=1
      min_flow_rate=0.5   max_flow_rate=7
      max_expected_power=250000         min_expected_power=10000
      watt_threshold=1000               display_zero_lines=true

    Named-entity overrides (<<entity>>_<<key>>=<<value>>):
      Entity names: grid, solar, home, fossil_fuel_percentage
      Examples:
        solar_display_zero=true
        grid_name=My+Grid
        fossil_fuel_percentage_color_icon=false

    Individual overrides (individual_<<index>>_<<key>>=<<value>>):
      Examples:
        individual_0_display_zero=true
        individual_1_name=EV+Charger+2
        individual_2_color_icon=false
-->
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Flow</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #03a9f4;
      --accent-color: #ff9800;
      --ha-card-border-radius: 12px;
      --ha-card-box-shadow: none;
      --energy-grid-consumption-color: #488fc2;
      --energy-grid-return-color: #8353d1;
      --energy-solar-color: #ff9800;
      --energy-non-fossil-color: #0f9d58;
      --energy-battery-in-color: #f06292;
      --energy-battery-out-color: #4db6ac;
      --energy-home-color: #3f9142;
      --mdc-theme-primary: #03a9f4;
      --mdc-typography-font-family: 'Roboto', sans-serif;
      --primary-text-color: #212121;
      --secondary-text-color: #727272;
      --disabled-text-color: #bdbdbd;
      --primary-background-color: transparent;
      --secondary-background-color: transparent;
      --card-background-color: transparent;
      --ha-card-background: transparent;
      --divider-color: rgba(0,0,0,0.12);
      color-scheme: light dark;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary-text-color: #e1e1e1;
        --secondary-text-color: #9b9b9b;
        --disabled-text-color: #6f6f6f;
        --primary-background-color: transparent;
        --secondary-background-color: transparent;
        --card-background-color: transparent;
        --ha-card-background: transparent;
        --divider-color: rgba(225,225,225,0.12);
      }
    }
    html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: transparent; font-family: 'Roboto', sans-serif; }
    #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; box-sizing: border-box; padding: 8px; }
    #view-name { font-size: 13px; font-weight: 500; color: var(--secondary-text-color); padding: 0 0 4px; letter-spacing: 0.04em; text-transform: uppercase; display: none; }
    power-flow-card-plus { display: block; width: 100%; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="view-name"></div>
</div>

<script type="module">
  customElements.define('hui-card', class extends HTMLElement {
    connectedCallback() { this.style.display = 'block'; }
  });

  customElements.define('ha-card', class extends HTMLElement {
    connectedCallback() { this.style.display = 'block'; this.style.overflow = 'hidden'; }
  });

  customElements.define('ha-ripple', class extends HTMLElement {
    connectedCallback() { this.style.display = 'none'; }
  });

  const mdi = await import('/local/mdi.min.js');

  function mdiPath(iconName) {
    if (!iconName) return '';
    const key = 'mdi' + iconName.replace('mdi:', '')
      .split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join('');
    return mdi[key] || '';
  }

  function makeSvg(path, sizePx) {
    return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
      style="display:inline-block;width:${sizePx}px;height:${sizePx}px;fill:currentColor;vertical-align:middle"
      preserveAspectRatio="xMidYMid meet" focusable="false" aria-hidden="true">
      <path d="${path}"/>
    </svg>`;
  }

  customElements.define('ha-svg-icon', class extends HTMLElement {
    constructor() { super(); this.attachShadow({mode:'open'}); }
    set path(v) { this._path = v; this._render(); }
    get path() { return this._path; }
    static get observedAttributes() { return ['path']; }
    attributeChangedCallback(n, _, v) { if (n === 'path') { this._path = v; this._render(); } }
    connectedCallback() { this._render(); }
    _render() { this.shadowRoot.innerHTML = makeSvg(this._path || '', 24); }
  });

  customElements.define('ha-icon', class extends HTMLElement {
    constructor() { super(); this.attachShadow({mode:'open'}); }
    set icon(v) { this._icon = v; this._render(); }
    get icon() { return this._icon; }
    static get observedAttributes() { return ['icon']; }
    attributeChangedCallback(n, _, v) { if (n === 'icon') { this._icon = v; this._render(); } }
    connectedCallback() { this._render(); }
    _render() {
      const sz = this.classList.contains('small') ? 12 : 24;
      this.shadowRoot.innerHTML = makeSvg(mdiPath(this._icon), sz);
    }
  });

  await import('/local/community/power-flow-card-plus/power-flow-card-plus.js?v=8');
  await customElements.whenDefined('power-flow-card-plus');

  const card = document.createElement('power-flow-card-plus');
  const p    = new URLSearchParams(window.location.search.replace(/^\?+/, ''));

  // Load initial data — _config comes from settings.json via update.py
  const initData = await fetch('/local/views/power-flow-card-plus/data.json?t=' + Date.now())
    .then(r => r.json()).catch(() => ({}));

  // Coerce URL string values to appropriate JS types
  function coerce(v) {
    if (v === 'true')  return true;
    if (v === 'false') return false;
    const n = Number(v);
    return (!isNaN(n) && v !== '') ? n : v;
  }

  // Apply URL param overrides onto a deep copy of _config from settings.json
  // Named entities sorted longest-first to avoid prefix collisions
  const entityNames = ['fossil_fuel_percentage', 'grid', 'solar', 'home'];

  const cfg = JSON.parse(JSON.stringify(initData._config || {}));
  cfg.type = "custom:power-flow-card-plus";

  for (const [param, raw] of p.entries()) {
    if (param === 'name') continue; // handled separately below
    const val = coerce(raw);
    let handled = false;

    // individual_<<index>>_<<key>> — e.g. individual_0_display_zero=true
    const indMatch = param.match(/^individual_(\d+)_(.+)$/);
    if (indMatch) {
      const idx = Number(indMatch[1]);
      const key = indMatch[2];
      if (cfg.entities?.individual?.[idx]) cfg.entities.individual[idx][key] = val;
      handled = true;
    }

    // <<entity>>_<<key>> — e.g. solar_display_zero=true
    if (!handled) {
      for (const eName of entityNames) {
        if (param.startsWith(eName + '_')) {
          const key = param.slice(eName.length + 1);
          if (cfg.entities?.[eName]) cfg.entities[eName][key] = val;
          handled = true;
          break;
        }
      }
    }

    // top-level — e.g. w_decimals=1
    if (!handled) cfg[param] = val;
  }

  card.setConfig(cfg);

  const viewName = p.get('name');
  if (viewName) {
    const el = document.getElementById('view-name');
    el.textContent = viewName;
    el.style.display = 'block';
    document.title = viewName;
  }

  document.getElementById('wrap').appendChild(card);

  card.updateComplete.then(() => {
    if (card.shadowRoot) {
      const sheet = new CSSStyleSheet();
      sheet.replaceSync(`
        .card-content { padding: 16px }
        .circle-container.grid .label,
        .circle-container.home .label { margin-top: 4px }
      `);
      card.shadowRoot.adoptedStyleSheets = [...card.shadowRoot.adoptedStyleSheets, sheet];
    }
  });

  function applyStates(data) {
    if (data._error) return;
    const states = Object.fromEntries(Object.entries(data).filter(([k]) => !k.startsWith('_')));
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    card.hass = {
      states,
      localize: (key) => key.split('.').pop().replace(/_/g, ' '),
      locale: { language: "th", number_format: "decimal_dot", time_format: "language", date_format: "language", first_weekday: "monday" },
      config: {
        unit_system: { energy: "kWh", power: "W", length: "km", mass: "kg", pressure: "Pa", temperature: "°C", volume: "L" },
        currency: "THB", country: "TH", time_zone: "Asia/Bangkok"
      },
      user: { is_admin: false, name: "monitor" },
      themes: { darkMode: dark, theme: "default" },
      selectedTheme: { dark: dark },
      connected: true,
      callService: () => Promise.resolve(),
      callApi:     () => Promise.resolve()
    };
  }

  async function refresh() {
    try {
      const data = await fetch('/local/views/power-flow-card-plus/data.json?t=' + Date.now()).then(r => r.json());
      applyStates(data);
    } catch (e) {
      console.error('refresh failed:', e);
    }
  }

  applyStates(initData);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', refresh);
  setInterval(refresh, 15000);
</script>
</body>
</html>
