# power-flow — HA shell_command + automation to refresh data every 15 s

shell_command:
  views_update_power_flow: "python3 /config/myapp/views/power-flow/update.py"

automation:
  - alias: "views: Refresh Power Flow data"
    id: views_refresh_power_flow
    trigger:
      - platform: time_pattern
        seconds: "/15"
    action:
      - service: shell_command.views_update_power_flow
    mode: single
