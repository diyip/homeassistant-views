<!--
  energy-usage-graph — hourly energy usage chart

  Served at: /local/views/energy-usage-graph/index.html
  Data from: /local/views/energy-usage-graph/data.json  (refreshed every 5 min by update.py)

  URL parameters:
    name=Page+Title   optional page title shown above chart
    hours=24          rolling window: last N hours from now (max 168)
    day=1             days back from today: 0=today, 1=yesterday+today, 2=two days ago to today
                      start is always N days ago at 00:00, end is always today at 23:00
                      (day takes priority over hours when both are set)
    show_date=true    show the date label above the chart (hidden by default)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Usage</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/local/echarts.min.js"></script>
  <style>
    :root {
      --primary-text-color: #212121;
      --secondary-text-color: #727272;
      --divider-color: rgba(0,0,0,0.12);
      --energy-grid-consumption-color: #488fc2;
      --energy-solar-color: #ff9800;
      --energy-grid-return-color: #8353d1;
      color-scheme: light dark;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary-text-color: #e1e1e1;
        --secondary-text-color: #9b9b9b;
        --divider-color: rgba(225,225,225,0.12);
      }
    }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: 'Roboto', sans-serif; }
    #wrap { display: flex; flex-direction: column; width: 100%; height: 100%; box-sizing: border-box; padding: 8px; gap: 4px; }
    #view-name { font-size: 13px; font-weight: 500; color: var(--secondary-text-color); letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0; display: none; }
    #chart-card { background: transparent; border-radius: 12px; flex: 1; min-height: 0; padding: 16px; box-sizing: border-box; display: flex; flex-direction: column; }
    #chart-date { font-size: 12px; color: var(--secondary-text-color); margin-bottom: 4px; flex-shrink: 0; display: none; }
    #chart { flex: 1; min-height: 0; }
    #error { color: #ef5350; font-size: 13px; padding: 8px; display: none; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="view-name"></div>
  <div id="chart-card">
    <div id="chart-date"></div>
    <div id="chart"></div>
    <div id="error"></div>
  </div>
</div>

<script>
  const p    = new URLSearchParams(window.location.search.replace(/^\?+/, ''));
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const hoursParam = p.get('hours');
  const hours = hoursParam ? Math.min(Math.max(parseInt(hoursParam, 10), 1), 168) : null;
  const dayParam = p.get('day');
  const day = dayParam !== null ? Math.min(Math.max(parseInt(dayParam, 10), 0), 6) : null;

  const viewName = p.get('name');
  if (viewName) {
    const el = document.getElementById('view-name');
    el.textContent = viewName;
    el.style.display = 'block';
    document.title = viewName;
  }

  if (p.get('show_date') === 'true') {
    document.getElementById('chart-date').style.display = 'block';
  }

  const CSS          = getComputedStyle(document.documentElement);
  const textColor    = CSS.getPropertyValue('--primary-text-color').trim();
  const subtextColor = CSS.getPropertyValue('--secondary-text-color').trim();
  const dividerColor = CSS.getPropertyValue('--divider-color').trim();
  const gridColor    = CSS.getPropertyValue('--energy-grid-consumption-color').trim();
  const solarColor   = CSS.getPropertyValue('--energy-solar-color').trim();
  const exportColor  = CSS.getPropertyValue('--energy-grid-return-color').trim();
  const gridFill   = gridColor   + '7F';
  const solarFill  = solarColor  + '7F';
  const exportFill = exportColor + '7F';

  const chart = echarts.init(document.getElementById('chart'), dark ? 'dark' : null, { renderer: 'canvas' });

  function buildOption(timestamps, gridConsumed, solarUsed, gridExported, displayStart, displayEnd) {
    const R = 4;   // corner radius (px)
    const solarData = timestamps.map((t, i) => [t, solarUsed[i]]);
    const gridData  = timestamps.map((t, i) => [t, gridConsumed[i]]);
    const expData   = timestamps.map((t, i) => [t, gridExported[i]]);

    return {
      backgroundColor: 'transparent',
      textStyle: { fontFamily: 'Roboto, Noto, sans-serif', color: textColor },
      grid: { top: 15, bottom: 0, left: 1, right: 20, containLabel: true },
      xAxis: {
        type: 'time',
        min: displayStart,
        max: displayEnd,
        axisLabel: {
          color: textColor,
          fontSize: 12,
          hideOverlap: true,
          formatter: (val) => {
            const d = new Date(val);
            if (d.getHours() === 0 && d.getMinutes() === 0 && d.getSeconds() === 0) {
              return `{bold|${d.toLocaleDateString('en', { month: 'short', day: 'numeric' })}}`;
            }
            return `${String(d.getHours()).padStart(2, '0')}:00`;
          },
          rich: { bold: { fontWeight: 'bold' } },
        },
        splitLine: { show: true, lineStyle: { color: dividerColor } },
        axisLine:  { lineStyle: { color: dividerColor } },
        axisTick:  { lineStyle: { color: dividerColor } },
      },
      yAxis: {
        type: 'value',
        name: 'kWh',
        nameGap: 2,
        nameTextStyle: { align: 'left', color: textColor },
        axisLabel: {
          color: textColor,
          fontSize: 12,
          formatter: (() => {
            let prev;
            return (v) => {
              const diff = Math.abs(v - (prev ?? v)) || 1;
              prev = v;
              const decimals = Math.max(0, -Math.floor(Math.log10(diff)));
              return v.toFixed(decimals);
            };
          })(),
        },
        splitLine: { lineStyle: { color: dividerColor } },
      },
      tooltip: {
        trigger: 'axis',
        backgroundColor: dark ? '#1f2937' : '#ffffff',
        borderColor: dividerColor,
        textStyle: { color: textColor, fontSize: 12, fontFamily: 'Roboto, Noto, sans-serif' },
        formatter: (params) => {
          const ts = params[0]?.value[0];
          if (!ts) return '';
          const d   = new Date(ts);
          const end = new Date(ts + 3600000);
          const fmt = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
          let html = `<div style="font-weight:500;margin-bottom:4px">${fmt(d)} – ${fmt(end)}</div>`;
          let sumPositive = 0, countPositive = 0;
          params.forEach(p => {
            const v = p.value[1];
            if (v === 0) return;
            const isExport = v < 0;
            const abs  = Math.abs(v);
            const disp = abs < 0.1 ? abs.toFixed(3) : abs.toFixed(2);
            html += `<div>${p.marker} ${p.seriesName}: <span style="direction:ltr;display:inline">${disp} kWh</span></div>`;
            if (!isExport) { sumPositive += v; countPositive++; }
          });
          if (countPositive > 1) {
            html += `<br><b>Total consumed: ${sumPositive.toFixed(2)} kWh</b>`;
          }
          return html;
        },
      },
      series: [
        {
          name: 'Solar used',
          type: 'bar', barMaxWidth: 50, barCategoryGap: '15%',
          stack: 'total',
          color: solarFill, itemStyle: { borderWidth: 0, borderRadius: [R, R, 0, 0] },
          data: solarData, emphasis: { disabled: true },
        },
        {
          name: 'Grid consumed',
          type: 'bar', barMaxWidth: 50,
          stack: 'total',
          color: gridFill, itemStyle: { borderWidth: 0, borderRadius: [R, R, 0, 0] },
          data: gridData, emphasis: { disabled: true },
        },
        {
          name: 'Grid exported',
          type: 'bar', barMaxWidth: 50, barGap: '-100%',
          color: exportFill, itemStyle: { borderWidth: 0, borderRadius: [0, 0, R, R] },
          data: expData, emphasis: { disabled: true },
        },
      ],
    };
  }

  async function refresh() {
    try {
      const res  = await fetch('/local/views/energy-usage-graph/data.json?t=' + Date.now());
      const data = await res.json();

      if (data._error) {
        document.getElementById('error').textContent = data._error;
        document.getElementById('error').style.display = 'block';
        return;
      }
      document.getElementById('error').style.display = 'none';
      document.getElementById('chart-date').textContent = data.date || '';

      // Compute display window:
      // Compute display window (Bangkok UTC+7):
      //   default / ?day=0  → today 00:00 – today 23:00
      //   ?day=N            → N days ago 00:00 – today 23:00
      //   ?hours=N          → rolling last N hours from now
      const BANGKOK_MS = 7 * 60 * 60 * 1000;
      const nowBangkok = Date.now() + BANGKOK_MS;
      const todayMidnight = nowBangkok - (nowBangkok % 86_400_000) - BANGKOK_MS;
      const todayEnd = todayMidnight + 23 * 3_600_000;

      let displayStart, displayEnd;
      if (day !== null) {
        displayStart = todayMidnight - day * 86_400_000;
        displayEnd   = todayEnd;
      } else if (hours) {
        displayEnd   = Date.now();
        displayStart = displayEnd - hours * 3_600_000;
      } else {
        displayStart = todayMidnight;
        displayEnd   = todayEnd;
      }
      const mask = data.timestamps.map(t => t >= displayStart && t < displayEnd);

      const timestamps   = data.timestamps.filter((_, i) => mask[i]);
      const gridConsumed = data.grid_consumed.filter((_, i) => mask[i]);
      const solarUsed    = data.solar_used.filter((_, i) => mask[i]);
      const gridExported = data.grid_exported.filter((_, i) => mask[i]);

      chart.setOption(buildOption(timestamps, gridConsumed, solarUsed, gridExported,
                                  displayStart, displayEnd), { notMerge: true });
    } catch (e) {
      console.error('refresh failed:', e);
    }
  }

  window.addEventListener('resize', () => chart.resize());
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => location.reload());

  refresh();
  setInterval(refresh, 5 * 60 * 1000);
</script>
</body>
</html>
