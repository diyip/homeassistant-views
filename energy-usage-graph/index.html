<!--
  energy-usage-graph — standalone view, today's hourly energy usage
  Source : /config/myapp/views/energy-usage-graph/index.html
  Served : /local/views/energy-usage-graph/index.html
  Data   : /local/views/energy-usage-graph/data.json  (written by update.py every 5 min)

  URL parameters (all optional):
    name=Page+Title      Page title shown above chart
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Usage</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="/local/echarts.min.js"></script>
  <style>
    :root {
      --primary-background-color: #fafafa;
      --card-background-color: #ffffff;
      --primary-text-color: #212121;
      --secondary-text-color: #727272;
      --divider-color: rgba(0,0,0,0.12);
      --energy-grid-consumption-color: #488fc2;
      --energy-solar-color: #ff9800;
      --energy-grid-return-color: #8353d1;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary-background-color: #111827;
        --card-background-color: #1f2937;
        --primary-text-color: #e1e1e1;
        --secondary-text-color: #9b9b9b;
        --divider-color: rgba(225,225,225,0.12);
      }
    }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--primary-background-color); font-family: 'Roboto', sans-serif; }
    #wrap { display: flex; flex-direction: column; width: 100%; height: 100%; box-sizing: border-box; padding: 8px; gap: 4px; }
    #view-name { font-size: 13px; font-weight: 500; color: var(--secondary-text-color); letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0; display: none; }
    #chart-card { background: var(--card-background-color); border-radius: 12px; flex: 1; min-height: 0; padding: 16px; box-sizing: border-box; display: flex; flex-direction: column; }
    #chart-date { display: none; }
    #chart { flex: 1; min-height: 0; }
    #error { color: #ef5350; font-size: 13px; padding: 8px; display: none; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="view-name"></div>
  <div id="chart-card">
    <div id="chart-date"></div>
    <div id="chart"></div>
    <div id="error"></div>
  </div>
</div>

<script>
  const p    = new URLSearchParams(window.location.search.replace(/^\?+/, ''));
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  const viewName = p.get('name');
  if (viewName) {
    const el = document.getElementById('view-name');
    el.textContent = viewName;
    el.style.display = 'block';
    document.title = viewName;
  }

  const CSS          = getComputedStyle(document.documentElement);
  const textColor    = CSS.getPropertyValue('--primary-text-color').trim();
  const subtextColor = CSS.getPropertyValue('--secondary-text-color').trim();
  const dividerColor = CSS.getPropertyValue('--divider-color').trim();
  const gridColor    = CSS.getPropertyValue('--energy-grid-consumption-color').trim();
  const solarColor   = CSS.getPropertyValue('--energy-solar-color').trim();
  const exportColor  = CSS.getPropertyValue('--energy-grid-return-color').trim();
  // HA uses 50% alpha fill + full-opacity border (getEnergyColor appends "7F")
  const gridFill   = gridColor   + '7F';
  const solarFill  = solarColor  + '7F';
  const exportFill = exportColor + '7F';

  const chart = echarts.init(document.getElementById('chart'), dark ? 'dark' : null, { renderer: 'canvas' });

  // Apply rounded caps: top of highest positive bar, bottom of lowest negative bar
  function applyRoundedCaps(seriesList) {
    const n = seriesList[0]?.data.length ?? 0;
    for (let i = 0; i < n; i++) {
      for (let s = seriesList.length - 1; s >= 0; s--) {
        const v = seriesList[s].data[i][1];
        if (v > 0) {
          seriesList[s].data[i] = { value: seriesList[s].data[i], itemStyle: { borderRadius: [4, 4, 0, 0] } };
          break;
        }
      }
      for (let s = seriesList.length - 1; s >= 0; s--) {
        const v = seriesList[s].data[i][1];
        if (v < 0) {
          seriesList[s].data[i] = { value: seriesList[s].data[i], itemStyle: { borderRadius: [0, 0, 4, 4] } };
          break;
        }
      }
    }
  }

  function buildOption(data) {
    const ts   = data.timestamps;
    const solar = ts.map((t, i) => [t, data.solar_used[i]]);
    const grid  = ts.map((t, i) => [t, data.grid_consumed[i]]);
    const exp   = ts.map((t, i) => [t, data.grid_exported[i]]);

    const seriesList = [
      { name: 'Solar used',    data: solar, fill: solarFill,  border: solarColor  },
      { name: 'Grid consumed', data: grid,  fill: gridFill,   border: gridColor   },
      { name: 'Grid exported', data: exp,   fill: exportFill, border: exportColor },
    ];
    applyRoundedCaps(seriesList);

    return {
      backgroundColor: 'transparent',
      textStyle: { fontFamily: 'Roboto, Noto, sans-serif', color: textColor },
      grid: { top: 15, bottom: 0, left: 1, right: 1, containLabel: true },
      xAxis: {
        type: 'time',
        min: data.start_ms,
        max: data.end_ms,
        axisLabel: {
          color: textColor,
          fontSize: 12,
          hideOverlap: true,
          formatter: (val) => {
            const d = new Date(val);
            if (d.getHours() === 0 && d.getMinutes() === 0 && d.getSeconds() === 0) {
              return `{bold|${d.toLocaleDateString('en', { month: 'short', day: 'numeric' })}}`;
            }
            return `${String(d.getHours()).padStart(2, '0')}:00`;
          },
          rich: { bold: { fontWeight: 'bold' } },
        },
        splitLine: { show: true, lineStyle: { color: dividerColor } },
        axisLine: { lineStyle: { color: dividerColor } },
        axisTick: { lineStyle: { color: dividerColor } },
      },
      yAxis: {
        type: 'value',
        name: 'kWh',
        nameGap: 2,
        nameTextStyle: { align: 'left', color: textColor, fontSize: 12 },
        axisLabel: {
          color: textColor,
          fontSize: 12,
          formatter: (() => {
            let prev;
            return (v) => {
              const diff = Math.abs(v - (prev ?? v)) || 1;
              prev = v;
              const decimals = Math.max(0, -Math.floor(Math.log10(diff)));
              return v.toFixed(decimals);
            };
          })(),
        },
        splitLine: { lineStyle: { color: dividerColor, type: 'dashed' } },
      },
      tooltip: {
        trigger: 'axis',
        backgroundColor: dark ? '#1f2937' : '#ffffff',
        borderColor: dividerColor,
        textStyle: { color: textColor, fontSize: 12, fontFamily: 'Roboto, Noto, sans-serif' },
        formatter: (params) => {
          const ts = params[0]?.value[0];
          if (!ts) return '';
          const d   = new Date(ts - 30 * 60 * 1000);
          const end = new Date(d.getTime() + 3600000);
          const fmt = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
          let html = `<div style="font-weight:500;margin-bottom:4px">${fmt(d)} – ${fmt(end)}</div>`;
          let sumPositive = 0, countPositive = 0;
          params.forEach(p => {
            const v = p.value[1];
            if (v === 0) return;
            const disp = Math.abs(v);
            const fmt  = disp < 0.1 ? disp.toFixed(3) : disp.toFixed(2);
            html += `<div>${p.marker} ${p.seriesName}: <span style="direction:ltr;display:inline">${fmt} kWh</span></div>`;
            if (v > 0) { sumPositive += v; countPositive++; }
          });
          if (countPositive > 1) {
            html += `<br><b>Total consumed: ${sumPositive.toFixed(2)} kWh</b>`;
          }
          return html;
        },
      },
      series: seriesList.map(s => ({
        name:        s.name,
        type:        'bar',
        stack:       'usage',
        barMaxWidth: 50,
        color:       s.fill,
        itemStyle:   { borderColor: s.border, borderWidth: 0 },
        data:        s.data,
        emphasis:    { disabled: true },
      })),
    };
  }

  async function refresh() {
    try {
      const res  = await fetch('/local/views/energy-usage-graph/data.json?t=' + Date.now());
      const data = await res.json();

      if (data._error) {
        document.getElementById('error').textContent = data._error;
        document.getElementById('error').style.display = 'block';
        return;
      }
      document.getElementById('error').style.display = 'none';
      document.getElementById('chart-date').textContent = data.date || '';

      chart.setOption(buildOption(data), { notMerge: true });
    } catch (e) {}
  }

  window.addEventListener('resize', () => chart.resize());
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => location.reload());

  refresh();
  setInterval(refresh, 5 * 60 * 1000);
</script>
</body>
</html>
